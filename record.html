<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>模擬試験結果</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/style.css?v=3" />
  </head>

  <body>
    <header class="site-header">
      <div class="site-header-inner container">
        <h1 class="bk_title">
          <a href="index.html"> ウェブデザイン技能検定3級 </a>
        </h1>
        <button
          id="menu-toggle"
          class="menu-toggle"
          aria-label="メニューを開く"
        >
          ☰
        </button>
      </div>
    </header>
    <nav id="hamburger-menu" class="hamburger-menu" aria-label="サイトメニュー">
      <ul>
        <li><a href="index.html">最初に戻る</a></li>
        <li><a href="record.html">記録を見る</a></li>
        <li><a href="index.html?set=07">最新問題</a></li>
        <li><a href="index.html?set=0506">過去問題</a></li>
        <li><a href="https://fukuokamiyako.com">このサイトについて</a></li>
      </ul>
      <div class="menu-footer">
        <small>© Fukuokamiyako</small>
      </div>
    </nav>

    <div class="container">
      <div class="box">
        <h2>模擬試験結果</h2>

        <div class="result">
          今回の結果
          <strong id="result">-</strong>
        </div>

        <div>
          ベストスコア
          <strong id="best">-</strong>
        </div>

        <div class="history">
          <h3>あなたの履歴</h3>

          <ul id="history"></ul>

          <p id="emptyMessage" class="empty"></p>
        </div>

        <a href="index.html" class="btn">もう一度挑戦</a>

        <br />

        <button id="clearBtn" class="btn clear">履歴をリセット</button>
      </div>
    </div>

    <script>
      const menuToggle = document.getElementById("menu-toggle");
      const hamburgerMenu = document.getElementById("hamburger-menu");

      if (menuToggle && hamburgerMenu) {
        menuToggle.addEventListener("click", () => {
          hamburgerMenu.classList.toggle("active");
        });
      }

      /* 問題数 */

      const totalQuestions = 25;

      /* URLパラメータ取得 */

      const params = new URLSearchParams(location.search);

      const scoreParam = params.get("score");

      const correct = Number(scoreParam);

      /* localStorage取得（壊れ対策） */

      let history;

      try {
        history = JSON.parse(localStorage.getItem("exam_history")) || [];
      } catch {
        history = [];
      }

      /* スコアが有効なら保存 */

      if (
        scoreParam !== null &&
        !isNaN(correct) &&
        correct >= 0 &&
        correct <= totalQuestions
      ) {
        const record = {
          date: new Date().toLocaleDateString(),

          correct: correct,

          total: totalQuestions,
        };

        /* 直前の同一データ保存防止 */

        if (history.length === 0 || history[0].correct !== correct) {
          history.unshift(record);
        }

        /* 最大20件 */

        history = history.slice(0, 20);

        /* 保存 */

        localStorage.setItem("exam_history", JSON.stringify(history));
      }

      /* 今回結果表示 */

      if (scoreParam !== null && !isNaN(correct)) {
        document.getElementById("result").textContent =
          correct + " / " + totalQuestions;
      }

      /* ベストスコア */

      if (history.length > 0) {
        const best = Math.max(...history.map((h) => h.correct));

        document.getElementById("best").textContent =
          best + " / " + totalQuestions;
      }

      /* 履歴表示 */

      const ul = document.getElementById("history");

      const emptyMessage = document.getElementById("emptyMessage");

      if (history.length === 0) {
        emptyMessage.textContent = "まだ記録がありません。";
      } else {
        history.forEach((item) => {
          const li = document.createElement("li");

          li.textContent = item.date + "　" + item.correct + " / " + item.total;

          ul.appendChild(li);
        });
      }

      /* 履歴リセット */

      document.getElementById("clearBtn").addEventListener("click", () => {
        if (confirm("履歴を削除しますか？")) {
          localStorage.removeItem("exam_history");

          location.reload();
        }
      });
    </script>
  </body>
</html>
