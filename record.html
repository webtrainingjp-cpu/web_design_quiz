<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>模擬試験結果</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css?v=5" />
  </head>

  <body>
    <header class="site-header">
      <div class="site-header-inner container">
        <h1 class="bk_title">
          <a href="index.html"> ウェブデザイン技能検定3級 </a>
        </h1>
        <button
          id="menu-toggle"
          class="menu-toggle"
          aria-label="メニューを開く"
        >
          ☰
        </button>
      </div>
    </header>
    <nav id="hamburger-menu" class="hamburger-menu" aria-label="サイトメニュー">
      <ul>
        <li><a href="index.html">最初に戻る</a></li>
        <li><a href="record.html">記録を見る</a></li>
        <li><a href="index.html?set=07">最新問題</a></li>
        <li><a href="index.html?set=0506">過去問題</a></li>
        <li><a href="https://fukuokamiyako.com">このサイトについて</a></li>
      </ul>
      <div class="menu-footer">
        <small>© Fukuokamiyako</small>
      </div>
    </nav>
    <main>
      <div class="wrapper container">
        <h2 class="text-center">模擬試験結果</h2>

        <div class="result-cards">
          <div class="result-card">
            <p class="label">今回の結果</p>
            <p class="value" id="result">-</p>
          </div>

          <div class="result-card">
            <p class="label">ベストスコア</p>
            <p class="value" id="best">-</p>
          </div>
        </div>

        <h3 class="mt-4">今の模擬試験を復習しておきましょう。</h3>
        <ul id="review-history"></ul>

        <a href="index.html" class="btn">もう一度挑戦</a>

        <br />

        <button id="clearBtn" class="btn clear">履歴をリセット</button>
      </div>
    </main>

    <script>
      const menuToggle = document.getElementById("menu-toggle");
      const hamburgerMenu = document.getElementById("hamburger-menu");

      if (menuToggle && hamburgerMenu) {
        menuToggle.addEventListener("click", () => {
          hamburgerMenu.classList.toggle("active");
        });
      }

      /* 問題数 */

      const totalQuestions = 25;

      /* URLパラメータ取得 */

      const params = new URLSearchParams(location.search);

      const scoreParam = params.get("score");

      const correct = Number(scoreParam);

      /* localStorage取得（壊れ対策） */

      let history;
      let reviewHistory;

      try {
        history = JSON.parse(localStorage.getItem("exam_history")) || [];
      } catch {
        history = [];
      }

      try {
        reviewHistory =
          JSON.parse(localStorage.getItem("review_history")) || [];
      } catch {
        reviewHistory = [];
      }

      /* スコアが有効なら保存 */

      if (
        scoreParam !== null &&
        !isNaN(correct) &&
        correct >= 0 &&
        correct <= totalQuestions
      ) {
        const record = {
          date: new Date().toLocaleString("ja-JP", {
            year: "numeric",
            month: "numeric",
            day: "numeric",
            hour: "2-digit",
            minute: "2-digit",
          }),

          correct: correct,

          total: totalQuestions,
        };

        /* 直前の同一データ保存防止 */

        if (history.length === 0 || history[0].correct !== correct) {
          history.unshift(record);
        }

        /* 最大20件 */

        history = history.slice(0, 20);

        /* 保存 */

        localStorage.setItem("exam_history", JSON.stringify(history));
      }

      /* 今回結果表示 */

      if (scoreParam !== null && !isNaN(correct)) {
        document.getElementById("result").textContent =
          correct + " / " + totalQuestions;
      }

      /* ベストスコア */

      if (history.length > 0) {
        const best = Math.max(...history.map((h) => h.correct));

        document.getElementById("best").textContent =
          best + " / " + totalQuestions;
      }

      /* 履歴表示 */

      const reviewUl = document.getElementById("review-history");

      if (reviewUl) {
        if (reviewHistory.length === 0) {
          const li = document.createElement("li");
          li.textContent = "まだ復習データがありません。";
          reviewUl.appendChild(li);
        } else {
          reviewHistory.forEach((item) => {
            const li = document.createElement("li");
            const choices = item.choices || [];
            const userAnswer =
              choices[item.userAnswer] !== undefined
                ? choices[item.userAnswer]
                : "未回答";
            const correctAnswer =
              choices[item.correct] !== undefined
                ? choices[item.correct]
                : "不明";

            li.innerHTML = `
              <div class="review-item">
                <p class="review-question">
                  <strong>Q. ${item.question}</strong>
                </p>

                <ul class="review-choices">
                  ${choices
                    .map(
                      (choice, i) => `
                        <li class="
                          ${i === item.correct ? "correct-choice" : ""}
                          ${i === item.userAnswer ? "user-choice" : ""}
                        ">
                          ${choice}
                        </li>
                      `,
                    )
                    .join("")}
                </ul>

                <p class="review-answer ${item.userAnswer === item.correct ? "correct" : "wrong"}">
                  ${
                    item.userAnswer === item.correct
                      ? '<i class="fa-solid fa-circle-check"></i>'
                      : '<i class="fa-solid fa-circle-xmark"></i>'
                  }
                  あなたの回答：${userAnswer}
                </p>

                <p class="review-correct">
                  正解：${correctAnswer}
                </p>

                <p class="review-explanation">
                  ${item.explanation}
                </p>
              </div>
            `;

            reviewUl.appendChild(li);
          });
        }
      }

      /* 履歴リセット */

      document.getElementById("clearBtn").addEventListener("click", () => {
        if (confirm("履歴を削除しますか？")) {
          localStorage.removeItem("exam_history");

          location.reload();
        }
      });
    </script>
  </body>
</html>
