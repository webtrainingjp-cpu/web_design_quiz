    <!-- 変更: mainの中に既存コンテンツをまとめる -->
    <main>
      <div class="wrapper container">
        <div class="container mb-4 mb-lg-5 p-3">
          <div
            id="progress-info"
            class="mb-1 fw-bold"
            style="display: none"
          ></div>
          <div class="progress" style="display: none">
            <div
              id="progress-bar"
              class="progress-bar bg-success"
              style="width: 0%"
            >
              0%
            </div>
          </div>

          <div
            id="final-result"
            class="alert alert-info mt-4"
            role="alert"
            style="display: none"
          ></div>

          <button
            id="retry-button"
            class="btn btn-warning mt-3"
            style="display: none"
          >
            もう一度挑戦する
          </button>

          <div
            id="quiz-container"
            class="mt-3 mb-3 row quiz-container"
            style="display: none"
          ></div>

          <div class="next-btn mt-3">
            <div class="text-center">
              <div id="fire-effect" class="my-2"></div>
              <button
                id="next-button"
                class="btn btn-primary w-100 mt-0"
                style="display: none"
              >
                次の問題へ

          <!-- 変更: ファーストビューを整理したスタートエリア -->

                ランダム出題で実力確認、年度別の問題で試験対策ができます。

              <div class="start-buttons">
                <a
                  href="?set=07"
                  id="start-button"
                  class="btn start-main-button"
                >
                  ランダムスタート（最新）

                <a href="?set=0506" class="btn start-sub-button">
                  過去問でスタート
                </a>
              </div>
            </div>
          </section>
        </div>

    <!-- 解説モーダル -->

              class="btn-close"

          <div class="modal-footer">

              type="button"

              閉じる
